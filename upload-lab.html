<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Laboratory</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #7F7979;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .lab-form-container {
            width: 100%;
            max-width: 450px;
            background: #3D3B3C;
            padding: 35px;
            border-radius: 32px;
            border: 1px solid #e1e8ed;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.02);
        }

        .lab-page-title {
            font-size: 1.3rem;
            margin-bottom: 30px;
            text-align: center;
            color: #C1BDB3;
            letter-spacing: 1px;
        }

        .lab-input-group {
            margin-bottom: 22px;
        }

        .lab-field-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: #ccc;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .lab-text-input {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid #ccc;
            background: #ccc;
            font-size: 0.9rem;
        }

        .lab-file-input {
            width: 100%;
            font-size: 0.8rem;
            color: #C1BDB3;
            padding: 10px 0;
        }

        .lab-submit-button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            background: #ccc;
            color: #323031;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .lab-reset-button {
            width: 100%;
            background: none;
            border: 1px solid #7F7979;
            color: #999;
            padding: 12px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .lab-reset-button:hover {
            background: #fafafa;
            color: #3D3B3C;
            border-color: #ccc;
        }

        .lab-back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 0.75rem;
            color: #C1BDB3;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="lab-form-container">
        <h2 class="lab-page-title">LAB WORK SUBMISSION</h2>
        <form id="uploadForm">
            <div class="lab-input-group">
                <label class="lab-field-label">Activity Title</label>
                <input type="text" id="title" class="lab-text-input" placeholder="e.g., Lab 3" required>
            </div>

            <div class="lab-input-group">
                <label class="lab-field-label">Lab File</label>
                <input type="file" id="mainFile" class="lab-file-input">
            </div>

            <div class="lab-input-group">
                <label class="lab-field-label">Screenshot</label>
                <input type="file" id="proofImage" class="lab-file-input" accept="image/*">
            </div>

            <button type="submit" class="lab-submit-button">UPLOAD LABORATORY</button>
            <button type="button" class="lab-reset-button" onclick="clearForm()">Clear Selection</button>
        </form>
        <a href="Dashboard.html" class="lab-back-link">← Cancel</a>
    </div>

    <script>
        function clearForm() {
            document.getElementById('uploadForm').reset();
        }

        document.getElementById('uploadForm').onsubmit = function(e) {
            e.preventDefault();

            const titleVal = document.getElementById('title').value;
            const fileInput = document.getElementById('mainFile');
            const imageInput = document.getElementById('proofImage');

            if (!fileInput.files[0] && !imageInput.files[0]) {
                alert("Please upload at least one file.");
                return;
            }

            const reader = new FileReader();

            if (imageInput.files[0]) {
                reader.readAsDataURL(imageInput.files[0]);
                reader.onload = function() {
                    saveData(reader.result);
                };
            } else {
                saveData(null);
            }

            function saveData(imageData) {
                const newUpload = {
                    type: 'Lab',
                    title: titleVal,
                    fileName: fileInput.files[0] ? fileInput.files[0].name : "No document",
                    image: imageData
                };

                const currentUploads = JSON.parse(localStorage.getItem('myUploads') || '[]');
                currentUploads.push(newUpload);
                localStorage.setItem('myUploads', JSON.stringify(currentUploads));

                alert('Lab Uploaded!');
                window.location.href = 'view-submissions.html';
            }
        };
    </script>
</body>
</html>
