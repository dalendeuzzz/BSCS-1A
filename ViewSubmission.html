<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Submissions | Berry</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background-color: #7F7979; font-family: 'Inter', sans-serif; padding: 30px; }
  
  .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .back-link, .manage-link { 
    text-decoration: none; color: #3D3B3C; font-size: 0.7rem; font-weight: 700; 
    padding: 10px 18px; background: #ccc; border-radius: 14px; border: 1px solid #3D3B3C; text-transform: uppercase;
  }
  .manage-link { background: #3D3B3C; color: #ccc; border-radius: 14px;
    border: 1px solid #ccc; }

  h2 { font-size: 1.8rem; margin: 20px 0 40px 0; color: #323031; }
  .category-group { margin-bottom: 50px; width: 100%; }
  .group-label { font-size: 0.7rem; font-weight: 800; color: #7F7979; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; border-bottom: 1px solid #ccc; padding-bottom: 8px; }
  
  /* THE GRID: Kept exactly as requested to maintain columns and not collapse */
  .grid-container { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
    gap: 20px; 
  }

  .empty-msg { font-size: 0.8rem; color: #ccc; font-style: italic; padding: 10px 0; }

  .submission-card { background: #323031; border-radius: 20px; padding: 15px; border: 1px solid #e1e8ed; cursor: pointer; transition: 0.3s; }
  .submission-card:hover { transform: translateY(-5px); border-color: #323031; }
  
  .title { font-size: 0.95rem; font-weight: 700; color: #C1BDB3; margin-bottom: 2px; }
  .file-info { font-size: 0.7rem; color: #ccc; margin-bottom: 12px; }
  
  .preview-box { width: 100%; height: 160px; background: #f9f9f9; border-radius: 12px; overflow: hidden; display: flex; justify-content: center; align-items: center; border: 1px solid #f0f0f0; }
  .preview-img { width: 100%; height: 100%; object-fit: cover; }

  /* Modal */
  .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); justify-content: center; align-items: center; padding: 20px; }
  .modal-content { max-width: 95%; max-height: 90vh; border-radius: 10px; }
</style>
</head>
<body>

  <div class="nav-header">
    <a href="Dashboard.html" class="back-link">← Dashboard</a>
    <a href="ManageVault.html" class="manage-link">Edit Submissions</a>
  </div>
  
  <h2>Work Submissions</h2>

  <!-- Quiz Section -->
  <div class="category-group">
    <span class="group-label">Quizzes</span>
    <div id="quiz-grid" class="grid-container"></div>
  </div>

  <!-- Lab Section -->
  <div class="category-group">
    <span class="group-label">Lab Works</span>
    <div id="lab-grid" class="grid-container"></div>
  </div>

  <!-- Exam Section -->
  <div class="category-group">
    <span class="group-label">Major Exams</span>
    <div id="exam-grid" class="grid-container"></div>
  </div>

  <div id="imageModal" class="modal" onclick="this.style.display='none'">
    <img class="modal-content" id="fullImage">
  </div>

<script>
  
  const hardCodedData = [
    {
      title: "Quiz 1",
      type: "Quiz",
      fileName:,
      image: "dalendeuzzz/quiz1.jpg"
    },
    {
      title: "Quiz 2",
      type: "Quiz",
      fileName:,
      image: "dalendeuzz/quiz2.jpg" 
    },
    {
      title: "",
      type: "",
      fileName: "",
      image: ".jpg/png"
    }
  ];

  function loadSubmissions() {
    // 2. INTERACTIVE DATA (From LocalStorage)
    const localData = JSON.parse(localStorage.getItem('myUploads') || '[]');
    
    // Combine both lists
    const allData = [...hardCodedData, ...localData];
    
    const grids = { 
      'Quiz': document.getElementById('quiz-grid'), 
      'Lab': document.getElementById('lab-grid'), 
      'Exam': document.getElementById('exam-grid') 
    };
    
    // Clear grids and set default empty message
    Object.keys(grids).forEach(key => grids[key].innerHTML = '<div class="empty-msg">No uploads yet.</div>');

    allData.forEach((item) => {
      const grid = grids[item.type];
      if (grid) {
        // Remove "No uploads yet" if it's there
        const emptyMsg = grid.querySelector('.empty-msg');
        if (emptyMsg) emptyMsg.remove();

        const card = document.createElement('div');
        card.className = 'submission-card';
        card.onclick = () => { 
          if(item.image) { 
            document.getElementById('imageModal').style.display='flex'; 
            document.getElementById('fullImage').src=item.image; 
          } 
        };
        
        card.innerHTML = `
          <div class="card-title">${item.title}</div>
          <div class="card-filename">File: ${item.fileName}</div>
          <div class="preview-box">
            ${item.image ? `<img src="${item.image}" class="preview-img">` : 'No Preview'}
          </div>
        `;
        grid.appendChild(card);
      }
    });
  }

  window.onload = loadSubmissions;
</script>
</body>
</html>
