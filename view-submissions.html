<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Submissions</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #7F7979; 
            font-family: 'Inter', sans-serif; 
            padding: 30px; 
        }
      
        .nav-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
        }
    
        .back-link, .manage-link { 
            text-decoration: none; 
            color: #3D3B3C; 
            font-size: 0.7rem; 
            font-weight: 700; 
            padding: 10px 18px; 
            background: #ccc; 
            border-radius: 14px; 
            border: 1px solid #3D3B3C; 
            text-transform: uppercase;
        }
      
        .manage-link { 
            background: #3D3B3C; 
            color: #ccc; 
            border-radius: 14px;
            border: 1px solid #ccc; 
        }
    
        .page-main-title { 
            font-size: 1.8rem; 
            margin: 20px 0 40px 0; 
            color: #323031; 
        }
     
        .category-group { 
            margin-bottom: 50px; 
            width: 100%; 
        }
     
        .group-label { 
            font-size: 0.7rem; 
            font-weight: 800; 
            color: #7F7979; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 15px; 
            display: block; 
            border-bottom: 1px solid #ccc; 
            padding-bottom: 8px; 
        }
      
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
        }
    
        .empty-msg { 
            font-size: 0.8rem; 
            color: #ccc; 
            font-style: italic; 
            padding: 10px 0; 
        }
    
        .submission-card { 
            background: #323031; 
            border-radius: 20px; 
            padding: 15px; 
            border: 1px solid #e1e8ed; 
            cursor: pointer; 
            transition: 0.3s; 
        }
     
        .submission-card:hover { 
            transform: translateY(-5px); 
            border-color: #323031; 
        }
      
        .submission-title { 
            font-size: 0.95rem; 
            font-weight: 700; 
            color: #C1BDB3; 
            margin-bottom: 2px; 
        }
        
        .submission-file-info { 
            font-size: 0.7rem; 
            color: #ccc; 
            margin-bottom: 12px; 
        }
      
        .preview-container { 
            width: 100%;
            height: 160px; 
            background: #f9f9f9; 
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center; 
            border: 1px solid #f0f0f0;
        }

        .preview-image { 
            width: 100%; 
            height: 100%;
            object-fit: cover;
        }
    
        .image-modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(5px);
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        
        .image-modal-content {
            max-width: 95%;
            max-height: 90vh; 
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="Dashboard.html" class="back-link">← Dashboard</a>
        <a href="edit-submissions.html" class="manage-link">Edit Submissions</a>
    </div>
      
    <h2 class="page-main-title">Work Submissions</h2>
      
    <div class="category-group">
        <span class="group-label">Quizzes</span>
        <div id="quiz-grid" class="grid-container"></div>
    </div>
    
    <div class="category-group">
        <span class="group-label">Lab Works</span>
        <div id="lab-grid" class="grid-container"></div>
    </div>
    
    <div class="category-group">
        <span class="group-label">Major Exams</span>
        <div id="exam-grid" class="grid-container"></div>
    </div>
    
    <div id="imageModal" class="image-modal" onclick="this.style.display='none'">
        <img class="image-modal-content" id="fullImage">
    </div>

    <script>
        const hardCodedData = [
            {
                title: "Quiz 1",
                type: "Quiz",
                image: "dalendeuzzz/quiz1.jpg"
            },
            {
                title: "Quiz 2",
                type: "Quiz",
                image: "dalendeuzzz/quiz2.jpg" 
            }
        ];
      
        function loadSubmissions() {
            const localData = JSON.parse(localStorage.getItem('myUploads') || '[]');
            const allData = [...hardCodedData, ...localData];
            
            const grids = { 
                'Quiz': document.getElementById('quiz-grid'), 
                'Lab': document.getElementById('lab-grid'), 
                'Exam': document.getElementById('exam-grid') 
            };
            
            Object.keys(grids).forEach(key => {
                if(grids[key]) grids[key].innerHTML = '<div class="empty-msg">No uploads yet.</div>';
            });
      
            allData.forEach((item) => {
                const targetKey = item.type;
                const grid = grids[targetKey];
                
                if (grid) {
                    const emptyMsg = grid.querySelector('.empty-msg');
                    if (emptyMsg) emptyMsg.remove();
            
                    const card = document.createElement('div');
                    card.className = 'submission-card';
                    
                    card.onclick = () => { 
                        if(item.image && item.image !== ".jpg/png") { 
                            document.getElementById('imageModal').style.display = 'flex'; 
                            document.getElementById('fullImage').src = item.image; 
                        } 
                    };
                    
                    const fileDisplay = item.fileName ? `<div class="submission-file-info">📁 ${item.fileName}</div>` : '';
                    
                    card.innerHTML = `
                        <div class="submission-title">${item.title || "Untitled Submission"}</div>
                        ${fileDisplay}
                        <div class="preview-container">
                            ${(item.image && item.image !== ".jpg/png") ? 
                                `<img src="${item.image}" class="preview-image" onerror="this.parentElement.innerHTML='Preview Error'">` : 
                                '<span style="color:#7F7979; font-size: 0.7rem;">NO PREVIEW</span>'}
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }
      
        window.onload = loadSubmissions;
    </script>
</body>
</html>
