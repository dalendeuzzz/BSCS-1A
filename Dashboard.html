<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berry | Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #7F7979;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
    font-family: 'Inter', sans-serif;
  }

  .container {
    width: 100%;
    max-width: 500px;
  }

  /* Navigation */
  .nav-header {
    width: 100%;
    display: flex;
    margin-bottom: 40px;
  }

  .back-link {
    text-decoration: none;
    color: #ccc;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 12px 20px;
    background: #3D3B3C;
    border-radius: 14px;
    border: 1px solid #ccc;
    transition: 0.3s;
    text-transform: uppercase;
  }

  .back-link:hover { background: #fafafa; border-color: #d1d8dd; }

  /* Dynamic Header Section */
  .welcome-section {
    text-align: left;
    margin-bottom: 30px;
  }

  h1 { 
    font-size: 1.8rem; 
    color: #323031; 
    margin-bottom: 8px; 
    letter-spacing: -0.5px;
  }
  
  .subtitle { color: #C1BDB3; font-size: 0.85rem; }

  /* Upload Action Cards */
  .upload-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 30px;
  }

  .item-card {
    background: #323031;
    padding: 24px;
    border-radius: 24px;
    border: 1px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    transition: all 0.3s ease;
  }

  .item-card:hover {
    transform: translateY(-4px);
    border-color: #1a1a1a;
    box-shadow: 0 12px 24px rgba(0,0,0,0.04);
  }

  .card-content h3 { font-size: 1rem; color: #C1BDB3; margin-bottom: 4px; }
  .card-content p { font-size: 0.75rem; color: #7F7979; }

  .arrow { color: #ccc; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
  .item-card:hover .arrow { color: #1a1a1a; transform: translateX(5px); }

  /* View Vault Button */
  .view-all-btn {
    display: block;
    width: 100%;
    text-align: center;
    text-decoration: none;
    background: #323031; 
    color: #C1BDB3;
    padding: 20px;
    border-radius: 22px;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-transform: uppercase;
  }

  .view-all-btn:hover { background: #333; transform: scale(0.98); }

  .status-footer {
    margin-top: 60px;
    text-align: center;
    font-size: 0.6rem;
    color: #ccc;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="nav-header">
    <a href="index.html" class="back-link">← Portfolio</a>
  </div>

  <div class="welcome-section">
    <!-- ID used for JS greeting -->
    <h1 id="greeting">Hello!</h1>
    <p class="subtitle">Categorize and secure your academic files.</p>
  </div>

  <div class="upload-list">
    
    <a href="uQuiz.html" class="item-card">
      <div class="card-content">
        <h3>Quizzes</h3>
        <p>Title, File, & Proof</p>
      </div>
      <div class="arrow">→</div>
    </a>

    <a href="uLab.html" class="item-card">
      <div class="card-content">
        <h3>Lab Works</h3>
        <p>Reports & Screenshots</p>
      </div>
      <div class="arrow">→</div>
    </a>

    <a href="uExam.html" class="item-card">
      <div class="card-content">
        <h3>Major Exams</h3>
        <p>Midterms & Finals</p>
      </div>
      <div class="arrow">→</div>
    </a>

  </div>

  <a href="ViewSubmission.html" class="view-all-btn">Open Submissions</a>

  <div class="status-footer">
    daleneduzzz • 2026
  </div>

</div>

<script>
  function setGreeting() {
    const hour = new Date().getHours();
    const greetingElement = document.getElementById("greeting");
    let text = "";

    if (hour < 12) {
      text = "Good Morning, Dhylan";
    } else if (hour < 18) {
      text = "Good Afternoon, Dhylan";
    } else {
      text = "Good Evening, Dhylan";
    }

    greetingElement.innerText = text;
  }

  // Run when the page loads
  window.onload = setGreeting;
</script>

</body>
</html>
